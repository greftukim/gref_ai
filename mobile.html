<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GREF - 농산물 가격예측</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<script>
// Register Filler plugin for fill between datasets
Chart.register(Chart.Filler);
</script>
<style>
:root {
  --bg: #F4F6F8;
  --surface: #FFFFFF;
  --text: #1E293B;
  --dim: #475569;
  --muted: #94A3B8;
  --border: #E2E8F0;
  --green: #059669;
  --red: #E11D48;
  --accent: #2563EB;
  --sans: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
}
.header-top { display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:18px; font-weight:700; }
.header h1 span { color: var(--accent); }
.header-date { font-size:12px; color:var(--muted); margin-top:2px; }

/* Tab Navigation */
.tab-nav {
  display:flex; gap:6px; padding:8px 16px 0;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.tab-nav::-webkit-scrollbar { display:none; }
.tab-btn {
  flex-shrink:0;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--dim);
  font-family: var(--sans);
}
.tab-btn.active {
  background: var(--text);
  color: #fff;
  border-color: var(--text);
}

/* Period Buttons */
.period-bar {
  display:flex; gap:4px; padding:10px 16px;
  overflow-x:auto;
}
.period-btn {
  flex-shrink:0;
  padding: 6px 12px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--sans);
  color: var(--dim);
}
.period-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* KPI Cards */
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 16px 10px;
}
.kpi-card {
  background: var(--surface);
  border-radius: 14px;
  padding: 14px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.kpi-card.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}
.kpi-accent {
  position:absolute; top:0; left:0; right:0; height:3px;
}
.kpi-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--dim);
  margin-bottom: 8px;
  padding-top: 4px;
}
.kpi-name .emoji { margin-right: 4px; }
.kpi-price {
  font-size: 22px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  line-height: 1.2;
}
.kpi-unit { font-size:11px; color:var(--muted); margin-left:2px; }
.kpi-delta {
  font-size: 12px;
  font-weight: 600;
  margin-top: 4px;
}
.kpi-delta.up { color: var(--red); }
.kpi-delta.dn { color: var(--accent); }
.kpi-delta.flat { color: var(--muted); }
.kpi-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

/* Chart Section */
.chart-section {
  padding: 0 16px 12px;
}
.chart-box {
  background: var(--surface);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 12px;
}
.chart-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.chart-title .color-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.chart-wrap {
  position: relative;
  height: 220px;
}
/* Overview forecast badge + collapsible */
.ov-badge-row {
  display:flex; align-items:center; gap:4px;
  cursor:pointer; -webkit-tap-highlight-color:transparent;
}
.ov-badge {
  padding: 3px 8px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.ov-badge.up { background: rgba(225,29,72,0.1); color: var(--red); }
.ov-badge.dn { background: rgba(37,99,235,0.1); color: var(--accent); }
.ov-badge.flat { background: rgba(148,163,184,0.1); color: var(--muted); }
.ov-badge-arrow {
  font-size: 10px; color: var(--muted);
  transition: transform 0.2s;
}
.ov-badge-arrow.open { transform: rotate(180deg); }
.ov-comment-box {
  display: none;
  margin-top: 10px;
  padding: 12px;
  background: var(--bg);
  border-radius: 10px;
  width: 100%;
}
.ov-comment-box.open { display: block; }
.ov-comment-header {
  font-size: 14px; font-weight: 700; margin-bottom: 6px;
}
.ov-comment-note {
  font-size: 11px; color: var(--muted); margin-bottom: 10px;
}
.chart-wrap canvas { width:100% !important; }
.chart-title-row {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:8px;
}
.nongnet-link {
  font-size:11px; font-weight:500; color:var(--green);
  text-decoration:none; white-space:nowrap;
}
.nongnet-link:hover { text-decoration:underline; }

/* Forecast Card */
.forecast-section {
  padding: 0 16px 12px;
}
.fc-card {
  background: var(--surface);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 14px;
}
.fc-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
}
.fc-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.fc-row:last-child { border-bottom: none; }
.fc-label { color: var(--dim); }
.fc-value { font-weight: 600; font-variant-numeric: tabular-nums; }
.fc-value.up { color: var(--red); }
.fc-value.dn { color: var(--accent); }
.fc-range {
  font-size: 11px;
  color: var(--muted);
}

/* Weekly Trend */
.trend-section {
  padding: 0 16px 12px;
}
.trend-card {
  background: var(--surface);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 14px;
}
.trend-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
}
.trend-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 12px;
}
.trend-week { width: 36px; color: var(--dim); flex-shrink:0; }
.trend-bar-wrap { flex:1; height:18px; background: #F1F5F9; border-radius:4px; overflow:hidden; position:relative; }
.trend-bar {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
  position: absolute;
}
.trend-bar.up { background: rgba(225,29,72,0.25); left:50%; }
.trend-bar.dn { background: rgba(37,99,235,0.25); right:50%; }
.trend-pct { width:48px; text-align:right; font-weight:600; font-variant-numeric:tabular-nums; flex-shrink:0; }
.trend-pct.up { color: var(--red); }
.trend-pct.dn { color: var(--accent); }

/* Model Info Banner */
.model-banner {
  margin: 0 16px 12px;
  padding: 12px 14px;
  background: linear-gradient(135deg, #1E293B, #334155);
  border-radius: 14px;
  color: #fff;
  font-size: 12px;
}
.model-banner .label { color: #94A3B8; margin-bottom:4px; }
.model-banner .model-name { font-size:14px; font-weight:600; margin-bottom:6px; }
.model-stats { display:flex; gap:16px; }
.model-stat-val { font-size:16px; font-weight:700; }
.model-stat-label { font-size:10px; color:#94A3B8; }

/* Chart Legend */
.chart-legend {
  display:flex; gap:12px; margin-top:8px; flex-wrap:wrap;
}
.chart-legend-item {
  display:flex; align-items:center; gap:4px; font-size:11px; color:var(--dim);
}
.legend-line {
  width:18px; height:2px; border-radius:1px;
}
.legend-line.dashed {
  background: repeating-linear-gradient(90deg, currentColor 0 4px, transparent 4px 7px);
  height:2px;
}
.legend-band {
  width:18px; height:10px; border-radius:2px; opacity:0.3;
}
.legend-today {
  width:0; height:12px;
  border-left: 2px dashed var(--red);
}

/* Comment Box (website style) */
.comment-section { padding: 0 16px 12px; }
.comment-card {
  background: var(--surface);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 14px;
}
.comment-card.up-card { border-left: 3px solid var(--red); }
.comment-card.dn-card { border-left: 3px solid var(--accent); }
.comment-card.flat-card { border-left: 3px solid var(--muted); }
.comment-header-badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 10px;
  display: inline-block; margin-bottom: 8px;
}
.comment-header-badge.up { background:rgba(225,29,72,0.1); color:var(--red); }
.comment-header-badge.dn { background:rgba(37,99,235,0.1); color:var(--accent); }
.comment-header-badge.flat { background:rgba(148,163,184,0.15); color:var(--muted); }
.comment-title {
  font-size: 15px; font-weight: 700; margin-bottom: 10px;
}
.comment-note {
  font-size: 11px; color: var(--muted); margin-bottom: 12px;
}
.fc-week-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 0; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.fc-week-row:last-of-type { border-bottom: none; }
.fc-week-label { color: var(--dim); }
.fc-week-value { text-align: right; font-variant-numeric: tabular-nums; }
.fc-week-value.up { color: var(--red); }
.fc-week-value.dn { color: var(--accent); }
.comment-duration {
  font-size: 14px; font-weight: 700;
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.comment-narrative {
  font-size: 12px; line-height: 1.7; color: var(--dim);
  margin-top: 10px;
}

/* Footer */
.footer {
  text-align:center;
  padding: 20px 16px 32px;
  font-size: 11px;
  color: var(--muted);
}

/* Toast */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background: rgba(30,41,59,0.92); color:#fff;
  padding: 10px 20px; border-radius:20px;
  font-size:13px; z-index:999;
  opacity:0; transition: opacity 0.3s;
  pointer-events:none;
}
.toast.show { opacity:1; }

/* Loading */
.loading {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 60px 0;
  color: var(--muted);
  font-size: 14px;
}
.spinner {
  width:32px; height:32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius:50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1><span>GREF</span></h1>
      <div class="header-date" id="header-date">데이터 로딩중...</div>
    </div>
  </div>
</div>

<div class="tab-nav" id="tab-nav"></div>
<div class="period-bar" id="period-bar"></div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    데이터를 불러오는 중...
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ──
const PRODUCTS = {
  tomato:     { name:'토마토(완숙)', emoji:'🍅', unit:'원/kg', color:'#FF5C5C', bg:'rgba(255,92,92,', nongnet:'https://www.nongnet.or.kr/front/M000000006/stats/totSearch2.do?keyword=080303' },
  cucumber:   { name:'오이(백다다기)', emoji:'🥒', unit:'원/kg', color:'#22C55E', bg:'rgba(34,197,94,', nongnet:'https://www.nongnet.or.kr/front/M000000006/stats/totSearch2.do?keyword=0901' },
  paprika:    { name:'파프리카(미니)', emoji:'🌶️', unit:'원/kg', color:'#FF8C00', bg:'rgba(255,140,0,', nongnet:'https://www.nongnet.or.kr/front/M000000006/stats/totSearch2.do?keyword=132606' },
  strawberry: { name:'딸기(설향)', emoji:'🍓', unit:'원/kg', color:'#FF69B4', bg:'rgba(255,105,180,', nongnet:'https://www.nongnet.or.kr/front/M000000006/stats/totSearch2.do?keyword=080413' }
};
const CROP_IDS = Object.keys(PRODUCTS);
const OFF_SEASON = { strawberry: [7, 8] };
const PERIODS = [
  { label:'7일', days:7 },
  { label:'30일', days:30 },
  { label:'90일', days:90 },
  { label:'180일', days:180 },
  { label:'과거 비교', days:'compare' }
];

// ── State ──
let state = {
  view: 'overview',
  period: 30,
  data: {},
  forecast: {},
  modelPerf: null,
  testResults: null,
  lastUpdated: '',
  today: ''
};
let chart = null;

// ── Utils ──
function fmt(n) { return n ? Math.round(n).toLocaleString() : '-'; }
function fmtDate(s) { return s ? s.replace(/-/g, '.').slice(2) : '-'; }
function pct(v) { return (v > 0 ? '+' : '') + v.toFixed(1) + '%'; }
function deltaArrow(v) { return v > 0.05 ? '▲' : v < -0.05 ? '▼' : '−'; }
function deltaCls(v) { return v > 0.05 ? 'up' : v < -0.05 ? 'dn' : 'flat'; }

function toggleOvComment(id) {
  var box = document.getElementById(id);
  var arrow = document.getElementById('arrow-' + id);
  if (box) { box.classList.toggle('open'); }
  if (arrow) { arrow.classList.toggle('open'); }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1800);
}

function calcStats(arr) {
  if (!arr || !arr.length) return null;
  var prices = arr.map(function(d) { return d.price; });
  var last = prices[prices.length - 1];
  var prev = prices.length > 1 ? prices[prices.length - 2] : last;
  var first = prices[0];
  var sum30 = 0, cnt30 = Math.min(30, prices.length);
  for (var i = prices.length - cnt30; i < prices.length; i++) sum30 += prices[i];
  var avg30 = sum30 / cnt30;
  var change1d = (last - prev) / prev * 100;
  var changePeriod = (last - first) / first * 100;
  return { last:last, prev:prev, avg30:avg30, change1d:change1d, changePeriod:changePeriod };
}

function getFiltered(id) {
  var hist = state.data[id];
  if (!hist || !hist.length) return [];
  var days = typeof state.period === 'number' ? state.period : 180;
  return hist.slice(-days);
}

function getForecast(id) {
  var fc = state.forecast[id];
  if (!fc || !fc.forecast) return [];
  var offMonths = OFF_SEASON[id] || [];
  return fc.forecast.filter(function(f) {
    var m = new Date(f.date).getMonth() + 1;
    return offMonths.indexOf(m) === -1;
  });
}

// ── Data Loading ──
function loadData() {
  fetch('./data/prices.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(json) {
      state.lastUpdated = json.last_updated || '';
      state.today = json.today || '';
      state.data = json.historical || {};
      state.forecast = json.forecast || {};
      state.modelPerf = json.model_performance || null;
      state.testResults = json.test_results || null;
      document.getElementById('header-date').textContent =
        '마지막 업데이트: ' + state.lastUpdated;
      renderTabs();
      renderPeriods();
      render();
    })
    .catch(function(e) {
      document.getElementById('app').innerHTML =
        '<div class="loading" style="color:var(--red);">데이터 로딩 실패<br><small>' + e.message + '</small></div>';
    });
}

// ── Tabs ──
function renderTabs() {
  var html = '<button class="tab-btn ' + (state.view === 'overview' ? 'active' : '') +
    '" onclick="setView(\'overview\')">전체 요약</button>';
  CROP_IDS.forEach(function(id) {
    var p = PRODUCTS[id];
    html += '<button class="tab-btn ' + (state.view === id ? 'active' : '') +
      '" onclick="setView(\'' + id + '\')">' + p.emoji + ' ' + p.name.split('(')[0] + '</button>';
  });
  document.getElementById('tab-nav').innerHTML = html;
}

function renderPeriods() {
  var html = '';
  var showCompare = state.view !== 'overview';
  PERIODS.forEach(function(p) {
    if (p.days === 'compare' && !showCompare) return;
    var isActive = state.period === p.days;
    var arg = typeof p.days === 'string' ? "'" + p.days + "'" : p.days;
    html += '<button class="period-btn ' + (isActive ? 'active' : '') +
      '" onclick="setPeriod(' + arg + ')">' + p.label + '</button>';
  });
  document.getElementById('period-bar').innerHTML = html;
}

function setView(v) {
  state.view = v;
  renderTabs();
  render();
}

function setPeriod(d) {
  state.period = d;
  renderPeriods();
  render();
}

function getFilteredDays(id, days) {
  var hist = state.data[id];
  if (!hist || !hist.length) return [];
  return hist.slice(-days);
}

// ── Render ──
function render() {
  if (state.view === 'overview') {
    renderOverview();
  } else {
    renderDetail(state.view);
  }
}

function renderOverview() {
  var html = '';
  // KPI cards
  html += '<div class="kpi-grid">';
  CROP_IDS.forEach(function(id) {
    var p = PRODUCTS[id];
    var data = getFiltered(id);
    var s = calcStats(data);
    if (!s) return;
    var cls = deltaCls(s.change1d);
    html += '<div class="kpi-card" onclick="setView(\'' + id + '\')">' +
      '<div class="kpi-accent" style="background:' + p.color + '"></div>' +
      '<div class="kpi-name"><span class="emoji">' + p.emoji + '</span>' + p.name.split('(')[0] + '</div>' +
      '<div><span class="kpi-price">' + fmt(s.last) + '</span><span class="kpi-unit">원/kg</span></div>' +
      '<div class="kpi-delta ' + cls + '">' + deltaArrow(s.change1d) + ' ' + Math.abs(s.change1d).toFixed(1) + '% 전일대비</div>' +
      '<div class="kpi-sub">30일 평균 ' + fmt(s.avg30) + '</div>' +
      '</div>';
  });
  html += '</div>';

  // Mini charts for each crop
  CROP_IDS.forEach(function(id, ci) {
    var p = PRODUCTS[id];
    var data = getFiltered(id);
    var fore = getForecast(id);
    if (!data.length) return;
    var s2 = calcStats(data);
    // Forecast badge + collapsible comment
    var badgeHtml = '', commentId = 'ov-comment-' + id;
    if (fore.length >= 7 && s2) {
      var weeks = weeklyBins(fore, s2.last);
      var weekAvg = 0;
      for (var bi = 0; bi < Math.min(14, fore.length); bi++) weekAvg += fore[bi].price;
      weekAvg /= Math.min(14, fore.length);
      var fChg = (weekAvg - s2.last) / s2.last * 100;
      var fCls = deltaCls(fChg);
      var fArrow = fChg > 0.5 ? '↑' : fChg < -0.5 ? '↓' : '→';
      var fLabel = fChg > 0.5 ? '상승 구간 예측' : fChg < -0.5 ? '하락 구간 예측' : '보합 구간 예측';
      badgeHtml = '<div class="ov-badge-row" onclick="toggleOvComment(\'' + commentId + '\')">' +
        '<div class="ov-badge ' + fCls + '">' + fArrow + ' ' + fLabel + '</div>' +
        '<span class="ov-badge-arrow" id="arrow-' + commentId + '">&#9660;</span></div>';
      // Build collapsible content
      badgeHtml += '<div class="ov-comment-box" id="' + commentId + '">';
      if (weeks.length > 0) {
        // Find trigger week
        var triggerW = 1;
        for (var tw = 0; tw < weeks.length; tw++) {
          if ((fChg > 0 && weeks[tw].changePct > 2) || (fChg < 0 && weeks[tw].changePct < -2)) { triggerW = tw + 1; break; }
        }
        var dirWord = fChg > 0.5 ? '상승' : fChg < -0.5 ? '하락' : '보합';
        badgeHtml += '<div class="ov-comment-header">' + triggerW + '주 후 단가 ' + dirWord + ' 구간 시작 예정</div>';
        badgeHtml += '<div class="ov-comment-note">※ 변동률은 업데이트 기준일 AI 예측가 기준입니다.</div>';
        weeks.forEach(function(w) {
          var wCls = w.changePct >= 0 ? 'up' : 'dn';
          badgeHtml += '<div class="fc-week-row"><span class="fc-week-label"><b>' + w.week + '주</b> (' +
            fmtRange(w.startDate) + '~' + fmtRange(w.endDate) + ')</span>' +
            '<span class="fc-week-value ' + wCls + '"><b>' + pct(w.changePct) + '</b> / 약 ' + fmt(w.avg) + '원/kg</span></div>';
        });
      }
      badgeHtml += '</div>';
    }
    html += '<div class="chart-section">' +
      '<div class="chart-box">' +
      '<div class="chart-title-row" style="align-items:flex-start">' +
      '<div class="chart-title" style="margin-bottom:0"><span class="color-dot" style="background:' + p.color + '"></span>' +
      p.emoji + ' ' + p.name + '</div>' + badgeHtml + '</div>' +
      '<div class="chart-wrap"><canvas id="chart-' + id + '"></canvas></div>' +
      '</div></div>';
  });

  html += '<div class="footer">GREF · 농산물 가격예측 AI 대시보드<br>데이터: 농넷 · 매일 자동 갱신</div>';
  document.getElementById('app').innerHTML = html;

  // Draw mini charts
  CROP_IDS.forEach(function(id) {
    var el = document.getElementById('chart-' + id);
    if (el) drawChart(el, id, true);
  });
}

function renderDetail(id) {
  var p = PRODUCTS[id];
  var data = getFiltered(id);
  var fore = getForecast(id);
  var s = calcStats(data);
  if (!s) { document.getElementById('app').innerHTML = '<div class="loading">데이터 없음</div>'; return; }

  var html = '';

  // Large KPI
  var cls = deltaCls(s.change1d);
  html += '<div style="padding:12px 16px">' +
    '<div class="kpi-card active" style="border-color:' + p.color + '">' +
    '<div class="kpi-accent" style="background:' + p.color + '"></div>' +
    '<div class="kpi-name"><span class="emoji">' + p.emoji + '</span>' + p.name + '</div>' +
    '<div><span class="kpi-price" style="font-size:28px">' + fmt(s.last) + '</span><span class="kpi-unit">원/kg</span></div>' +
    '<div class="kpi-delta ' + cls + '">' + deltaArrow(s.change1d) + ' ' + Math.abs(s.change1d).toFixed(1) + '% 전일대비</div>' +
    '<div class="kpi-sub">30일 평균 ' + fmt(s.avg30) + ' · 기간변동 ' + pct(s.changePeriod) + '</div>' +
    '</div></div>';

  // Chart
  if (state.period === 'compare') {
    html += '<div class="chart-section"><div class="chart-box">' +
      '<div class="chart-title-row"><div class="chart-title" style="margin-bottom:0"><span class="color-dot" style="background:' + p.color + '"></span>올해 vs 작년 가격 비교</div>' +
      '<a class="nongnet-link" href="' + p.nongnet + '" target="_blank" rel="noopener">농넷 바로가기 &rarr;</a></div>' +
      '<div class="chart-wrap" style="height:280px"><canvas id="compare-chart"></canvas></div>' +
      '</div></div>';
  } else {
    html += '<div class="chart-section"><div class="chart-box">' +
      '<div class="chart-title-row"><div class="chart-title" style="margin-bottom:0"><span class="color-dot" style="background:' + p.color + '"></span>가격 추이 & AI 예측</div>' +
      '<a class="nongnet-link" href="' + p.nongnet + '" target="_blank" rel="noopener">농넷 바로가기 &rarr;</a></div>' +
      '<div class="chart-wrap" style="height:260px"><canvas id="detail-chart"></canvas></div>' +
      '</div></div>';
  }

  // Forecast summary (hide in compare mode)
  if (fore.length > 0 && state.period !== 'compare') {
    var weeks = weeklyBins(fore, s.last);
    html += '<div class="forecast-section"><div class="fc-card">' +
      '<div class="fc-title">AI 예측 요약 (180일)</div>';
    var points = [
      { label: '내일', idx: 0 },
      { label: '1주일 후', idx: 6 },
      { label: '2주일 후', idx: 13 },
      { label: '1개월 후', idx: 29 },
      { label: '3개월 후', idx: 89 }
    ];
    points.forEach(function(pt) {
      if (pt.idx >= fore.length) return;
      var f = fore[pt.idx];
      var chg = (f.price - s.last) / s.last * 100;
      var vc = deltaCls(chg);
      html += '<div class="fc-row">' +
        '<span class="fc-label">' + pt.label + '</span>' +
        '<span>' +
        '<span class="fc-value ' + vc + '">' + fmt(f.price) + ' (' + pct(chg) + ')</span>' +
        '<br><span class="fc-range">' + fmt(f.lo) + ' ~ ' + fmt(f.hi) + '</span>' +
        '</span></div>';
    });
    html += '</div></div>';

    // Forecast comment box (website style)
    if (weeks.length >= 2) {
      // Detect trend segments
      var upStart = -1, dnStart = -1, peakW = weeks[0], troughW = weeks[0];
      weeks.forEach(function(w) {
        if (w.changePct > peakW.changePct) peakW = w;
        if (w.changePct < troughW.changePct) troughW = w;
      });
      // Find first sustained direction
      var firstUp = -1, firstDn = -1;
      for (var wi = 0; wi < weeks.length; wi++) {
        if (weeks[wi].changePct > 2 && firstUp === -1) firstUp = wi;
        if (weeks[wi].changePct < -2 && firstDn === -1) firstDn = wi;
      }
      var direction = peakW.changePct > Math.abs(troughW.changePct) ? 'up' : 'dn';
      if (Math.abs(peakW.changePct) < 2 && Math.abs(troughW.changePct) < 2) direction = 'flat';
      var dirArrow = direction === 'up' ? '↑' : direction === 'dn' ? '↓' : '→';
      var dirLabel = direction === 'up' ? '상승' : direction === 'dn' ? '하락' : '보합';
      var triggerWeek = direction === 'up' ? (firstUp >= 0 ? firstUp + 1 : 1) : (firstDn >= 0 ? firstDn + 1 : 1);
      var headerText = triggerWeek + '주 후 단가 ' + dirLabel + ' 구간 시작 예정';

      html += '<div class="comment-section"><div class="comment-card ' + direction + '-card">' +
        '<div class="comment-header-badge ' + direction + '">' + dirArrow + ' ' + dirLabel + ' 구간 예측</div>' +
        '<div class="comment-title">' + headerText + '</div>' +
        '<div class="comment-note">※ 변동률은 업데이트 기준일 AI 예측가 기준입니다.</div>';

      // Weekly rows (website style: 1주 (03/28~04/03)  +7.7% / 약 7,612원/kg)
      weeks.forEach(function(w) {
        var cls = w.changePct >= 0 ? 'up' : 'dn';
        html += '<div class="fc-week-row">' +
          '<span class="fc-week-label"><b>' + w.week + '주</b> (' + fmtRange(w.startDate) + '~' + fmtRange(w.endDate) + ')</span>' +
          '<span class="fc-week-value ' + cls + '"><b>' + pct(w.changePct) + '</b> / 약 ' + fmt(w.avg) + '원/kg</span>' +
          '</div>';
      });

      // Trend duration + narrative
      var sustained = 0;
      if (direction === 'up') {
        for (var si = 0; si < weeks.length; si++) { if (weeks[si].changePct > 0) sustained++; else break; }
      } else {
        for (var si = 0; si < weeks.length; si++) { if (weeks[si].changePct < 0) sustained++; else break; }
      }
      if (sustained < 1) sustained = 1;
      html += '<div class="comment-duration">약 ' + sustained + '주간 지속 예상</div>';

      // Historical narrative
      var lastYear = new Date();
      lastYear.setFullYear(lastYear.getFullYear() - 1);
      var lyMonth = lastYear.getMonth() + 1;
      var thisMonth = new Date().getMonth() + 1;
      html += '<div class="comment-narrative">작년 시점(' + (lastYear.getFullYear()) + '.' +
        String(lyMonth).padStart(2,'0') + ' ~ ' + lastYear.getFullYear() + '.' +
        String(Math.min(12, lyMonth + 2)).padStart(2,'0') + ') ' + p.name.split('(')[0] +
        ' 단가는 유사한 계절적 흐름을 보였습니다. 올해도 비슷한 계절적 흐름이 나타날 가능성이 있어 해당 패턴을 기반으로 예측했습니다.</div>';

      html += '</div></div>';
    }
  }

  html += '<div class="footer">GREF · 농산물 가격예측 AI 대시보드<br>데이터: 농넷 · 매일 자동 갱신</div>';
  document.getElementById('app').innerHTML = html;

  if (state.period === 'compare') {
    var cel = document.getElementById('compare-chart');
    if (cel) drawCompareChart(cel, id);
  } else {
    var el = document.getElementById('detail-chart');
    if (el) drawChart(el, id, true);
  }
}

// ── Chart Drawing ──
function drawChart(canvas, cropId, showForecast) {
  var p = PRODUCTS[cropId];
  var data = getFiltered(cropId);
  var allFore = getForecast(cropId);
  // Forecast period matches historical period
  var fore = showForecast !== false ? allFore.slice(0, state.period) : allFore.slice(0, Math.min(state.period, 30));
  if (!data.length) return;

  var labels = data.map(function(d) { return d.date; });
  var prices = data.map(function(d) { return d.price; });
  var foreLabels = fore.map(function(f) { return f.date; });
  var forePrices = fore.map(function(f) { return f.price; });
  var foreHi = fore.map(function(f) { return f.hi; });
  var foreLo = fore.map(function(f) { return f.lo; });

  var allLabels = labels.concat(foreLabels);
  var histData = prices.concat(new Array(foreLabels.length).fill(null));
  var foreData = new Array(labels.length).fill(null);
  // Connect forecast to last historical point
  var lastPrice = prices.length > 0 ? prices[prices.length - 1] : null;
  if (lastPrice !== null && forePrices.length > 0) {
    foreData[foreData.length - 1] = lastPrice;
  }
  foreData = foreData.concat(forePrices);
  // Connect hi/lo to last price so band starts from baseline
  var hiData = new Array(labels.length).fill(null);
  var loData = new Array(labels.length).fill(null);
  if (lastPrice !== null && foreHi.length > 0) {
    hiData[hiData.length - 1] = lastPrice;
    loData[loData.length - 1] = lastPrice;
  }
  hiData = hiData.concat(foreHi);
  loData = loData.concat(foreLo);

  var datasets = [
    {
      label: '실제 가격',
      data: histData,
      borderColor: p.color,
      backgroundColor: 'transparent',
      borderWidth: 2,
      pointRadius: 0,
      tension: 0.3,
      order: 2
    },
    {
      label: 'AI 예측',
      data: foreData,
      borderColor: p.color,
      backgroundColor: 'transparent',
      borderWidth: 2,
      borderDash: [6, 3],
      pointRadius: 0,
      tension: 0.3,
      order: 3
    },
    {
      label: '하한',
      data: loData,
      borderColor: 'transparent',
      backgroundColor: 'transparent',
      pointRadius: 0,
      fill: false,
      tension: 0.3,
      order: 5
    },
    {
      label: '상한',
      data: hiData,
      borderColor: 'transparent',
      backgroundColor: p.bg + '0.15)',
      pointRadius: 0,
      fill: '-1',
      tension: 0.3,
      order: 4
    }
  ];

  // Find today index for annotation line
  var todayStr = state.today || '';
  var todayIdx = -1;
  for (var ti = 0; ti < allLabels.length; ti++) {
    if (allLabels[ti] === todayStr) { todayIdx = ti; break; }
  }
  // If exact match not found, use last historical date
  if (todayIdx === -1 && labels.length > 0) {
    todayIdx = labels.length - 1;
    todayStr = labels[labels.length - 1];
  }

  var annotations = {};
  if (todayIdx >= 0) {
    annotations.todayLine = {
      type: 'line',
      xMin: todayStr,
      xMax: todayStr,
      borderColor: 'rgba(225,29,72,0.5)',
      borderWidth: 1.5,
      borderDash: [4, 3],
      label: {
        display: true,
        content: state.lastUpdated ? state.lastUpdated.split(' ')[0] : '기준일',
        position: 'start',
        backgroundColor: 'rgba(225,29,72,0.8)',
        color: '#fff',
        font: { size: 9, weight: '600' },
        padding: { x: 4, y: 2 },
        borderRadius: 4
      }
    };
  }

  new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: { labels: allLabels, datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        annotation: { annotations: annotations },
        tooltip: {
          backgroundColor: 'rgba(30,41,59,0.92)',
          titleFont: { size: 11 },
          bodyFont: { size: 12 },
          padding: 10,
          cornerRadius: 8,
          callbacks: {
            title: function(ctx) { return fmtDate(ctx[0].label); },
            label: function(ctx) {
              if (ctx.dataset.label === '상한' || ctx.dataset.label === '하한') return null;
              if (ctx.raw === null) return null;
              return ctx.dataset.label + ': ' + Math.round(ctx.raw).toLocaleString() + '원';
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            maxTicksLimit: 5,
            font: { size: 10 },
            callback: function(val, i) {
              var lbl = allLabels[i];
              return lbl ? lbl.slice(5) : '';
            }
          }
        },
        y: {
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: {
            font: { size: 10 },
            callback: function(v) { return v.toLocaleString(); }
          }
        }
      }
    }
  });

  // Add legend below chart
  var legendContainer = canvas.parentElement.parentElement.querySelector('.chart-legend');
  if (!legendContainer) {
    legendContainer = document.createElement('div');
    legendContainer.className = 'chart-legend';
    canvas.parentElement.parentElement.appendChild(legendContainer);
  }
  legendContainer.innerHTML =
    '<div class="chart-legend-item"><div class="legend-line" style="background:' + p.color + '"></div>실제 가격</div>' +
    '<div class="chart-legend-item"><div class="legend-line dashed" style="color:' + p.color + '"></div>AI 예측</div>' +
    '<div class="chart-legend-item"><div class="legend-band" style="background:' + p.color + '"></div>신뢰구간</div>' +
    '<div class="chart-legend-item"><div class="legend-today"></div>기준일</div>';
}

// ── Compare Chart (올해 vs 작년) ──
function drawCompareChart(canvas, cropId) {
  var p = PRODUCTS[cropId];
  var allHist = state.data[cropId];
  if (!allHist || allHist.length < 365) return;

  // Split into this year (last 180 days) and last year (same calendar period, 1yr ago)
  var now = new Date(allHist[allHist.length - 1].date);
  var thisYearData = [], lastYearData = [];
  var dayLabels = []; // MM/DD labels

  // Get last 180 days for "this year"
  var thisStart = new Date(now);
  thisStart.setDate(thisStart.getDate() - 179);

  // Build date map for quick lookup
  var dateMap = {};
  allHist.forEach(function(d) { dateMap[d.date] = d.price; });

  for (var i = 0; i < 180; i++) {
    var d = new Date(thisStart);
    d.setDate(d.getDate() + i);
    var dStr = d.toISOString().split('T')[0];
    var mm = String(d.getMonth() + 1).padStart(2, '0');
    var dd = String(d.getDate()).padStart(2, '0');
    dayLabels.push(mm + '/' + dd);
    thisYearData.push(dateMap[dStr] || null);

    // Same calendar day, 1 year ago
    var ly = new Date(d);
    ly.setFullYear(ly.getFullYear() - 1);
    var lyStr = ly.toISOString().split('T')[0];
    lastYearData.push(dateMap[lyStr] || null);
  }

  // Fill gaps (non-trading days) with linear interpolation
  function fillGaps(arr) {
    var result = arr.slice();
    for (var i = 0; i < result.length; i++) {
      if (result[i] === null) {
        var prev = null, next = null, pi = -1, ni = -1;
        for (var j = i - 1; j >= 0; j--) { if (result[j] !== null) { prev = result[j]; pi = j; break; } }
        for (var j = i + 1; j < result.length; j++) { if (result[j] !== null) { next = result[j]; ni = j; break; } }
        if (prev !== null && next !== null) {
          result[i] = Math.round(prev + (next - prev) * (i - pi) / (ni - pi));
        } else if (prev !== null) {
          result[i] = prev;
        } else if (next !== null) {
          result[i] = next;
        }
      }
    }
    return result;
  }
  thisYearData = fillGaps(thisYearData);
  lastYearData = fillGaps(lastYearData);

  var thisYear = now.getFullYear();
  var lastYear = thisYear - 1;

  new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: dayLabels,
      datasets: [
        {
          label: thisYear + '년 (올해)',
          data: thisYearData,
          borderColor: p.color,
          backgroundColor: 'transparent',
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0.3
        },
        {
          label: lastYear + '년 (작년)',
          data: lastYearData,
          borderColor: '#94A3B8',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [5, 3],
          pointRadius: 0,
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: {
          display: true,
          position: 'bottom',
          labels: { font: { size: 11 }, boxWidth: 20, padding: 12 }
        },
        tooltip: {
          backgroundColor: 'rgba(30,41,59,0.92)',
          titleFont: { size: 11 },
          bodyFont: { size: 12 },
          padding: 10,
          cornerRadius: 8,
          callbacks: {
            label: function(ctx) {
              if (ctx.raw === null) return null;
              return ctx.dataset.label + ': ' + Math.round(ctx.raw).toLocaleString() + '원';
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { maxTicksLimit: 6, font: { size: 10 } }
        },
        y: {
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { font: { size: 10 }, callback: function(v) { return v.toLocaleString(); } }
        }
      }
    }
  });
}

// ── Weekly Bins ──
function weeklyBins(foreArr, baseline) {
  var weeks = [];
  for (var w = 0; w < 8; w++) {
    var slice = foreArr.slice(w * 7, (w + 1) * 7);
    if (slice.length < 3) break;
    var sum = 0;
    for (var i = 0; i < slice.length; i++) sum += slice[i].price;
    var avg = sum / slice.length;
    var changePct = (avg - baseline) / baseline * 100;
    weeks.push({
      week: w + 1, avg: Math.round(avg), changePct: +changePct.toFixed(1),
      startDate: slice[0].date, endDate: slice[slice.length - 1].date
    });
  }
  return weeks;
}

function fmtRange(dateStr) {
  if (!dateStr) return '';
  var parts = dateStr.split('-');
  return parts[1] + '/' + parts[2]; // "2026-03-28" → "03/28"
}

// ── Swipe Gesture ──
(function() {
  var startX = 0, startY = 0;
  document.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - startX;
    var dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.7) return;
    if (state.view === 'overview') return;
    var idx = CROP_IDS.indexOf(state.view);
    if (idx === -1) return;
    if (dx < 0 && idx < CROP_IDS.length - 1) {
      setView(CROP_IDS[idx + 1]);
      showToast(PRODUCTS[CROP_IDS[idx + 1]].emoji + ' ' + PRODUCTS[CROP_IDS[idx + 1]].name.split('(')[0]);
    } else if (dx > 0 && idx > 0) {
      setView(CROP_IDS[idx - 1]);
      showToast(PRODUCTS[CROP_IDS[idx - 1]].emoji + ' ' + PRODUCTS[CROP_IDS[idx - 1]].name.split('(')[0]);
    } else if (dx > 0 && idx === 0) {
      setView('overview');
      showToast('전체 요약');
    }
  }, { passive: true });
})();

// ── Init ──
loadData();
