name: 도매단가 데이터 자동 업데이트

on:
  schedule:
    # 한국시간 오전 9시 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:   # 수동 실행 허용

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # prices.json commit & push 권한

    steps:
      # ── 1. 저장소 체크아웃 ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 환경 설정 ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. 의존성 설치 ─────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Chrome 설치 (nongnet_crawler Selenium용) ────────────────────────
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      # ── 5. 농넷 크롤링 → data/*.csv 업데이트 ─────────────────────────────
      - name: Run nongnet crawler
        env:
          # 크롤러 다운로드 경로를 Actions 임시 폴더로 지정
          NONGNET_DOWNLOAD_DIR: ${{ runner.temp }}/downloads
        run: |
          mkdir -p ${{ runner.temp }}/downloads
          python execution/nongnet_crawler.py
        continue-on-error: true   # 크롤링 실패 시에도 기존 CSV로 JSON 생성

      # ── 6a. 드리프트 감지 (예측선 vs 최신 실측치 비교) ────────────────────
      #       exit 10 → 재학습 필요, exit 0 → 기존 예측 재사용
      - name: Detect forecast drift
        id: drift
        run: |
          set +e
          python execution/detect_drift.py --window 10 --mape-threshold 20 --stale-days 14
          code=$?
          set -e
          echo "drift_exit=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" = "10" ]; then
            echo "retrain=true"  >> "$GITHUB_OUTPUT"
          elif [ "$code" = "0" ]; then
            echo "retrain=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::detect_drift.py failed with exit $code"
            exit "$code"
          fi

      # ── 6b. prices.json 생성 (드리프트 있으면 재학습, 없으면 기존 예측 재사용) ─
      - name: Generate prices.json
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
        run: |
          if [ "${{ steps.drift.outputs.retrain }}" = "true" ]; then
            echo "⚠ drift detected → re-training models"
            python execution/main_update.py
          else
            echo "✓ no drift → reusing existing forecast"
            python execution/main_update.py --skip-train
          fi

      # ── 7. dashboard.html 데이터 주입 (최신 데이터 정적 반영) ────────────────
      - name: Inject data into dashboard.html
        run: python execution/inject_data.py

      # ── 8. 변경사항 커밋 & 푸시 ───────────────────────────────────────────
      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/*.csv dashboard.html dashboard_data.json historical_data.json lgbm_forecast_dated.json model_performance.json
          git diff --staged --quiet || git commit -m "chore: 데이터 자동 업데이트 $(date +'%Y-%m-%d') [skip ci]"
          git push
